name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # ==================== Job 1: 构建多架构 APK ====================
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      
      - name: Set version variables
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="dev-${GITHUB_SHA::7}"
          fi
          VERSION_CODE="${{ github.run_number }}"
          
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "Version Name: $VERSION_NAME"
          echo "Version Code: $VERSION_CODE"
      
      # 创建调试密钥（如果没有配置正式密钥）
      - name: Create debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US" -storepass android -keypass android
      
      - name: Build all APKs
        run: |
          chmod +x gradlew
          # 构建通用 APK 和分架构 APK
          ./gradlew assembleRelease
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          # 如果不想使用调试密钥，可以配置这些 secrets
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      
      # 上传通用 APK
      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: DevInfo-${{ steps.version.outputs.version_name }}-universal
          path: app/build/outputs/apk/release/*-universal-release.apk
          retention-days: 30
      
      # 上传分架构 APK
      - name: Upload architecture APKs
        uses: actions/upload-artifact@v4
        with:
          name: DevInfo-${{ steps.version.outputs.version_name }}-archs
          path: |
            app/build/outputs/apk/release/*-arm64-v8a-release.apk
            app/build/outputs/apk/release/*-armeabi-v7a-release.apk
            app/build/outputs/apk/release/*-x86-release.apk
            app/build/outputs/apk/release/*-x86_64-release.apk
          retention-days: 30
      
      # 列出生成的文件（调试用）
      - name: List generated APKs
        run: |
          echo "=== 生成的 APK 文件 ==="
          find app/build/outputs/apk -name "*.apk" -type f | while read file; do
            echo "  $(basename "$file") - $(du -h "$file" | cut -f1)"
          done

  # ==================== Job 2: 生成更新日志 ====================
  generate-changelog:
    name: Generate Changelog
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate changelog from commits
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" --reverse)
          else
            COMMITS=$(git log --pretty=format:"%s" --reverse)
          fi
          
          FEATURES=""
          FIXES=""
          OTHER=""
          
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            
            if [[ "$line" =~ ^feat: ]]; then
              msg="${line#feat: }"
              FEATURES="${FEATURES}\n${FEATURES:+ }• $msg"
            elif [[ "$line" =~ ^fix: ]]; then
              msg="${line#fix: }"
              FIXES="${FIXES}\n${FIXES:+ }• $msg"
            else
              if [[ "$line" =~ ^[a-z]+: ]]; then
                OTHER="${OTHER}\n${OTHER:+ }• $line"
              fi
            fi
          done <<< "$COMMITS"
          
          CHANGELOG=""
          
          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}**新功能：**\n$FEATURES\n\n"
          fi
          
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}**修复：**\n$FIXES\n\n"
          fi
          
          if [ -n "$OTHER" ]; then
            CHANGELOG="${CHANGELOG}**其他：**\n$OTHER\n\n"
          fi
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="暂无详细更新记录\n\n"
          fi
          
          CHANGELOG="${CHANGELOG}---\n✨ 本次更新合并自 \`test\` 分支"
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ==================== Job 3: 创建 Release ====================
  create-release:
    name: Create Release
    needs: [build-apk, generate-changelog]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    
    steps:
      - name: Download universal APK
        uses: actions/download-artifact@v4
        with:
          name: DevInfo-${{ needs.build-apk.outputs.version_name }}-universal
          path: apk/universal/
      
      - name: Download architecture APKs
        uses: actions/download-artifact@v4
        with:
          name: DevInfo-${{ needs.build-apk.outputs.version_name }}-archs
          path: apk/archs/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ needs.build-apk.outputs.version_name }}"
          body: |
            ${{ needs.generate-changelog.outputs.changelog }}
            
            ---
            
            ### 📦 安装说明
            
            **推荐下载：**
            - **通用版** (`-universal`): 适用于所有设备，文件较大
            - **分架构版**: 根据手机 CPU 类型选择，文件更小
            
            **如何选择架构：**
            | 架构 | 适用设备 |
            |------|----------|
            | arm64-v8a | 主流 Android 手机 (2015年后) |
            | armeabi-v7a | 老款 32 位手机 |
            | x86/x86_64 | 模拟器或 Intel 设备 |
            
            **安装步骤：**
            1. 下载对应架构的 APK
            2. 如果提示"禁止安装未知来源应用"，请在设置中允许
            3. 如已安装旧版本，可能需要先卸载
            
            ### 🔧 技术信息
            - 构建版本：`${{ needs.build-apk.outputs.version_code }}`
            - 提交哈希：`${{ github.sha }}`
          files: |
            apk/universal/*.apk
            apk/archs/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
