name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # ==================== Job 1: 构建 APK ====================
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      
      - name: Set version variables
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="dev-${GITHUB_SHA::7}"
          fi
          VERSION_CODE="${{ github.run_number }}"
          
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "Version Name: $VERSION_NAME"
          echo "Version Code: $VERSION_CODE"
      
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevInfo-${{ steps.version.outputs.version_name }}-build-${{ steps.version.outputs.version_code }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ==================== Job 2: 生成更新日志 ====================
  generate-changelog:
    name: Generate Changelog
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate changelog from commits
        id: changelog
        run: |
          # 获取上一个 tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          # 获取所有 commit 消息
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" --reverse)
          else
            COMMITS=$(git log --pretty=format:"%s" --reverse)
          fi
          
          # 初始化分类
          FEATURES=""
          FIXES=""
          OTHER=""
          
          # 逐行处理 commit
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            
            # 检查是否以 feat: 或 fix: 开头
            if [[ "$line" =~ ^feat: ]]; then
              msg="${line#feat: }"
              FEATURES="${FEATURES}\n${FEATURES:+ }• $msg"
            elif [[ "$line" =~ ^fix: ]]; then
              msg="${line#fix: }"
              FIXES="${FIXES}\n${FIXES:+ }• $msg"
            else
              # 跳过没有前缀的提交（如 "Add README.md"）
              if [[ "$line" =~ ^[a-z]+: ]]; then
                OTHER="${OTHER}\n${OTHER:+ }• $line"
              fi
              # 否则完全忽略该提交
            fi
          done <<< "$COMMITS"
          
          # 构建最终 changelog
          CHANGELOG=""
          
          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}**新功能：**\n$FEATURES\n\n"
          fi
          
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}**修复：**\n$FIXES\n\n"
          fi
          
          if [ -n "$OTHER" ]; then
            CHANGELOG="${CHANGELOG}**其他：**\n$OTHER\n\n"
          fi
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="暂无详细更新记录\n\n"
          fi
          
          CHANGELOG="${CHANGELOG}---\n✨ 本次更新合并自 \`test\` 分支"
          
          # 输出
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # 打印调试信息
          echo "=== 生成的 Changelog ==="
          echo -e "$CHANGELOG"
          echo "========================"

  # ==================== Job 3: 创建 Release ====================
  create-release:
    name: Create Release
    needs: [build-apk, generate-changelog]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: DevInfo-${{ needs.build-apk.outputs.version_name }}-build-${{ needs.build-apk.outputs.version_code }}
          path: apk/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ needs.build-apk.outputs.version_name }}"
          body: |
            ${{ needs.generate-changelog.outputs.changelog }}
            
            ---
            
            ### 📦 安装说明
            - 下载 APK 后直接安装
            - 如遇安装失败，请先卸载旧版本
            
            ### 🔧 技术信息
            - 构建版本：`${{ needs.build-apk.outputs.version_code }}`
            - 提交哈希：`${{ github.sha }}`
          files: apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
