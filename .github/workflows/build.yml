name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      
      - name: Set version variables
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="dev-${GITHUB_SHA::7}"
          fi
          VERSION_CODE="${{ github.run_number }}"
          
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DevInfo-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: DevInfo-${{ needs.build.outputs.version_name }}
          path: apk/
      
      - name: Generate Changelog
        id: changelog
        run: |
          git clone --depth 1 https://github.com/${{ github.repository }}.git temp-repo
          cd temp-repo
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" --reverse)
          else
            COMMITS=$(git log --pretty=format:"%s" --reverse)
          fi
          
          FEATURES=""
          FIXES=""
          
          while IFS= read -r line; do
            if [[ "$line" =~ ^feat: ]]; then
              FEATURES="${FEATURES}\n• ${line#feat: }"
            elif [[ "$line" =~ ^fix: ]]; then
              FIXES="${FIXES}\n• ${line#fix: }"
            fi
          done <<< "$COMMITS"
          
          CHANGELOG=""
          [ -n "$FEATURES" ] && CHANGELOG="${CHANGELOG}**新功能：**$FEATURES\n\n"
          [ -n "$FIXES" ] && CHANGELOG="${CHANGELOG}**修复：**$FIXES\n\n"
          [ -z "$CHANGELOG" ] && CHANGELOG="暂无详细更新记录\n\n"
          
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          cd ..
          rm -rf temp-repo
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ needs.build.outputs.version_name }}"
          body: |
            ${{ steps.changelog.outputs.content }}
            
            ---
            
            ### 📦 安装说明
            下载 APK 到手机直接安装
            
            ### 🔧 技术信息
            - 构建号：`${{ needs.build.outputs.version_code }}`
          files: apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
