name: Build and Release

on:
  push:
    branches:
      - master
      - test
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名称 (例如: 1.0.1)'
        required: true
        type: string
      signature_type:
        description: '签名类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      create_release:
        description: '是否创建 GitHub Release'
        required: true
        default: false
        type: boolean
      release_notes:
        description: 'Release 更新内容 (可选，支持 Markdown)'
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  # ==================== 构建 APK ====================
  build:
    name: Build APK
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      signature_type: ${{ steps.version.outputs.signature_type }}
      create_release: ${{ steps.version.outputs.create_release }}
      trigger_type: ${{ steps.version.outputs.trigger_type }}
      trigger_actor: ${{ steps.version.outputs.trigger_actor }}
      build_time: ${{ steps.version.outputs.build_time }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 设置版本变量和构建信息
      - name: Set version variables
        id: version
        run: |
          # 获取触发信息
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TRIGGER_TYPE="手动触发 🖱️"
            TRIGGER_ACTOR="${{ github.actor }}"
            VERSION_NAME="${{ github.event.inputs.version_name }}"
            SIGNATURE_TYPE="${{ github.event.inputs.signature_type }}"
            CREATE_RELEASE="${{ github.event.inputs.create_release }}"
          else
            TRIGGER_TYPE="Push 触发 📤"
            TRIGGER_ACTOR="${{ github.actor }}"
            VERSION_NAME="dev-${GITHUB_SHA::7}"
            SIGNATURE_TYPE="debug"
            CREATE_RELEASE="false"
          fi
          
          # 构建号始终自动递增
          VERSION_CODE="${{ github.run_number }}"
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          BRANCH_NAME="${GITHUB_REF_NAME}"
          
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "signature_type=$SIGNATURE_TYPE" >> $GITHUB_OUTPUT
          echo "create_release=$CREATE_RELEASE" >> $GITHUB_OUTPUT
          echo "trigger_type=$TRIGGER_TYPE" >> $GITHUB_OUTPUT
          echo "trigger_actor=$TRIGGER_ACTOR" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "SIGNATURE_TYPE=$SIGNATURE_TYPE" >> $GITHUB_ENV
          echo "CREATE_RELEASE=$CREATE_RELEASE" >> $GITHUB_ENV
          echo "TRIGGER_TYPE=$TRIGGER_TYPE" >> $GITHUB_ENV
          echo "TRIGGER_ACTOR=$TRIGGER_ACTOR" >> $GITHUB_ENV
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          
          echo "========================================"
          echo "📦 版本名称: v$VERSION_NAME"
          echo "🔢 构建号: $VERSION_CODE"
          echo "🔏 签名类型: $SIGNATURE_TYPE"
          echo "🔔 触发方式: $TRIGGER_TYPE"
          echo "👤 触发者: $TRIGGER_ACTOR"
          echo "🌿 分支: $BRANCH_NAME"
          echo "========================================"

      # 创建 debug 密钥（始终创建，作为备用）
      - name: Create debug keystore
        run: |
          echo "🔧 创建调试密钥库... / Creating debug keystore..."
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Debug-CI, O=Android, C=CN" -storepass android -keypass android
          echo "✅ 调试密钥库已创建 / Debug keystore created"

      # 解码正式密钥（仅当需要时）
      - name: Decode release keystore
        if: env.SIGNATURE_TYPE == 'release'
        run: |
          echo "🔐 解密正式版密钥库... / Decoding release keystore..."
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
            echo "✅ 正式版密钥库已解密 / Release keystore decoded"
            ls -la release.keystore
          else
            echo "⚠️ 未找到 KEYSTORE_BASE64 密钥，回退至调试模式 / KEYSTORE_BASE64 secret not found, falling back to debug"
            echo "SIGNATURE_TYPE=debug" >> $GITHUB_ENV
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # 构建 APK
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          SIGNATURE_TYPE: ${{ env.SIGNATURE_TYPE }}
          KEYSTORE_PATH: ${{ env.SIGNATURE_TYPE == 'release' && 'release.keystore' || 'debug.keystore' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 列出生成的文件
      - name: List generated files
        run: |
          echo "=== 生成的 APK 文件 ==="
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "目录不存在"
          echo ""
          echo "=== APK 文件详情 ==="
          find app/build/outputs -name "*.apk" -type f 2>/dev/null | while read file; do
            echo "📱 $(basename "$file") - $(du -h "$file" | cut -f1)"
          done

      # 上传 APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DevInfo-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.signature_type }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # 构建成功总结
      - name: Build Success Summary
        if: success()
        run: |
          echo "========================================"
          echo "🎉 构建成功！"
          echo "========================================"
          echo ""
          echo "📦 构建信息："
          echo "  - 版本名称: v${{ env.VERSION_NAME }}"
          echo "  - 构建号: ${{ env.VERSION_CODE }}"
          echo "  - 签名类型: ${{ env.SIGNATURE_TYPE }}"
          echo "  - 构建时间: ${{ env.BUILD_TIME }}"
          echo ""
          echo "🔔 触发信息："
          echo "  - 触发方式: ${{ env.TRIGGER_TYPE }}"
          echo "  - 触发者: ${{ env.TRIGGER_ACTOR }}"
          echo "  - 分支: ${{ env.BRANCH_NAME }}"
          echo "  - Commit: ${GITHUB_SHA::7}"
          echo ""
          echo "========================================"
          echo "📥 下载 APK:"
          echo "  https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "========================================"

      # 发送构建通知到 GitHub Summary
      - name: Generate Build Summary
        if: success()
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🎉 构建成功！
          
          ## 📦 构建信息
          
          | 项目 | 值 |
          |------|-----|
          | **版本名称** | v${{ env.VERSION_NAME }} |
          | **构建号** | \`${{ env.VERSION_CODE }}\` |
          | **签名类型** | \`${{ env.SIGNATURE_TYPE }}\` |
          | **构建时间** | ${{ env.BUILD_TIME }} |
          
          ## 🔔 触发信息
          
          | 项目 | 值 |
          |------|-----|
          | **触发方式** | ${{ env.TRIGGER_TYPE }} |
          | **触发者** | @${{ env.TRIGGER_ACTOR }} |
          | **分支** | \`${{ env.BRANCH_NAME }}\` |
          | **Commit** | \`${GITHUB_SHA::7}\` |
          
          ## 📥 下载链接
          
          [查看运行详情](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ---
          *由 GitHub Actions 自动生成*
          EOF

  # ==================== 生成更新日志 ====================
  generate-changelog:
    name: Generate Changelog
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.create_release == 'true'
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" --reverse)
          else
            COMMITS=$(git log --pretty=format:"%s" --reverse)
          fi
          
          FEATURES=""
          FIXES=""
          PERF=""
          REFACTOR=""
          OTHER=""
          
          while IFS= read -r line; do
            [ -z "$line" ] && continue
          
            if [[ "$line" =~ ^feat: ]]; then
              msg="${line#feat: }"
              FEATURES="${FEATURES}\n${FEATURES:+ }• $msg"
            elif [[ "$line" =~ ^fix: ]]; then
              msg="${line#fix: }"
              FIXES="${FIXES}\n${FIXES:+ }• $msg"
            elif [[ "$line" =~ ^perf: ]]; then
              msg="${line#perf: }"
              PERF="${PERF}\n${PERF:+ }• $msg"
            elif [[ "$line" =~ ^refactor: ]]; then
              msg="${line#refactor: }"
              REFACTOR="${REFACTOR}\n${REFACTOR:+ }• $msg"
            elif [[ "$line" =~ ^(docs|style|test|chore|ci|build): ]]; then
              msg="${line}"
              OTHER="${OTHER}\n${OTHER:+ }• $msg"
            fi
          done <<< "$COMMITS"
          
          CHANGELOG=""
          [ -n "$FEATURES" ] && CHANGELOG="${CHANGELOG}**✨ 新功能：**\n$FEATURES\n\n"
          [ -n "$FIXES" ] && CHANGELOG="${CHANGELOG}**🐛 修复：**\n$FIXES\n\n"
          [ -n "$PERF" ] && CHANGELOG="${CHANGELOG}**⚡ 性能优化：**\n$PERF\n\n"
          [ -n "$REFACTOR" ] && CHANGELOG="${CHANGELOG}**♻️ 重构：**\n$REFACTOR\n\n"
          [ -n "$OTHER" ] && CHANGELOG="${CHANGELOG}**📌 其他：**\n$OTHER\n\n"
          
          if [ -n "${{ github.event.inputs.release_notes }}" ]; then
            CHANGELOG="${{ github.event.inputs.release_notes }}\n\n---\n\n$CHANGELOG"
          fi
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="暂无详细更新记录"
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ==================== 创建 Release ====================
  release:
    name: Create Release
    needs: [build, generate-changelog]
    runs-on: ubuntu-latest
    if: needs.build.outputs.create_release == 'true'

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: DevInfo-${{ needs.build.outputs.version_name }}-${{ needs.build.outputs.signature_type }}
          path: apk/

      - name: Rename APK
        run: |
          cd apk/
          for file in *.apk; do
            if [[ -f "$file" ]]; then
              new_name="DevInfo-v${{ needs.build.outputs.version_name }}-${{ needs.build.outputs.signature_type }}.apk"
              mv "$file" "$new_name"
              echo "Renamed to: $new_name"
            fi
          done
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ needs.build.outputs.version_name }}"
          name: "Version ${{ needs.build.outputs.version_name }}"
          body: |
            ## 🔖 Version ${{ needs.build.outputs.version_name }}
            
            | 项目 | 值 |
            |------|-----|
            | **构建号** | \`${{ needs.build.outputs.version_code }}\` |
            | **签名类型** | \`${{ needs.build.outputs.signature_type }}\` |
            | **触发方式** | ${{ needs.build.outputs.trigger_type }} |
            | **触发者** | @${{ needs.build.outputs.trigger_actor }} |
            | **构建时间** | ${{ needs.build.outputs.build_time }} |
            
            ---
            
            ${{ needs.generate-changelog.outputs.changelog }}
            
            ---
            
            ### 📦 安装说明
            1. 下载 APK 到手机直接安装
            2. 如提示"禁止安装未知来源应用"，请在设置中允许
            3. 如已安装旧版本，可能需要先卸载
            
            ### 🔧 技术信息
            - 构建链接: [GitHub Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - 提交哈希: \`${{ github.sha }}\`
          files: apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Release 成功总结
      - name: Release Success Summary
        if: success()
        run: |
          echo "========================================"
          echo "🚀 Release 创建成功！"
          echo "========================================"
          echo ""
          echo "📦 Release 信息："
          echo "  - 版本: v${{ needs.build.outputs.version_name }}"
          echo "  - 标签: v${{ needs.build.outputs.version_name }}"
          echo "  - 签名: ${{ needs.build.outputs.signature_type }}"
          echo ""
          echo "🔗 链接："
          echo "  https://github.com/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version_name }}"
          echo "========================================"