name: Build and Release

on:
  push:
    branches:
      - main
      - test
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名称 (例如: 1.0.1)'
        required: true
        type: string
      signature_type:
        description: '签名类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      create_release:
        description: '是否创建 GitHub Release'
        required: true
        default: false
        type: boolean
      release_title:
        description: 'Release 标题 (可选，默认使用版本号)'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      signature_type: ${{ steps.version.outputs.signature_type }}
      create_release: ${{ steps.version.outputs.create_release }}
      release_title: ${{ steps.version.outputs.release_title }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set version variables
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION_NAME="${{ github.event.inputs.version_name }}"
            SIGNATURE_TYPE="${{ github.event.inputs.signature_type }}"
            CREATE_RELEASE="${{ github.event.inputs.create_release }}"
            RELEASE_TITLE="${{ github.event.inputs.release_title }}"
          else
            VERSION_NAME="dev-${GITHUB_SHA::7}"
            SIGNATURE_TYPE="debug"
            CREATE_RELEASE="false"
            RELEASE_TITLE=""
          fi
          
          VERSION_CODE="${{ github.run_number }}"
          
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "signature_type=$SIGNATURE_TYPE" >> $GITHUB_OUTPUT
          echo "create_release=$CREATE_RELEASE" >> $GITHUB_OUTPUT
          echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "SIGNATURE_TYPE=$SIGNATURE_TYPE" >> $GITHUB_ENV
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV

      - name: Create debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Debug, O=Android, C=US" -storepass android -keypass android

      - name: Decode release keystore
        if: env.SIGNATURE_TYPE == 'release'
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          fi

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          SIGNATURE_TYPE: ${{ env.SIGNATURE_TYPE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DevInfo-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.signature_type }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  generate-changelog:
    name: Generate Release Notes
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.create_release == 'true'
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      release_title: ${{ steps.changelog.outputs.release_title }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --reverse)
          else
            COMMITS=$(git log --pretty=format:"- %s" --reverse)
          fi
          
          if [ -z "$COMMITS" ]; then
            COMMITS="- No changes"
          fi
          
          # 设置 Release 标题
          RELEASE_TITLE_INPUT="${{ needs.build.outputs.release_title }}"
          if [ -n "$RELEASE_TITLE_INPUT" ]; then
            RELEASE_TITLE="$RELEASE_TITLE_INPUT"
          else
            RELEASE_TITLE="Version v${{ needs.build.outputs.version_name }}"
          fi
          
          echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## $RELEASE_TITLE" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Build Info" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "- Version: ${{ needs.build.outputs.version_name }}" >> $GITHUB_OUTPUT
          echo "- Build Number: ${{ needs.build.outputs.version_code }}" >> $GITHUB_OUTPUT
          echo "- Signature: ${{ needs.build.outputs.signature_type }}" >> $GITHUB_OUTPUT
          echo "- Trigger: ${{ github.actor }}" >> $GITHUB_OUTPUT
          echo "- [View Build Log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  release:
    name: Create Release
    needs: [build, generate-changelog]
    runs-on: ubuntu-latest
    if: needs.build.outputs.create_release == 'true'

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: DevInfo-${{ needs.build.outputs.version_name }}-${{ needs.build.outputs.signature_type }}
          path: apk/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build.outputs.version_name }}
          name: ${{ needs.generate-changelog.outputs.release_title }}
          body: ${{ needs.generate-changelog.outputs.changelog }}
          files: apk/*.apk
          draft: false
          prerelease: ${{ needs.build.outputs.signature_type == 'debug' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}