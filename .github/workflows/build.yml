name: Build

on:
  push:
    branches:
      - main
      - test
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名称'
        required: true
        type: string
      signature_type:
        description: '签名类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      create_release:
        description: '是否创建 GitHub Release'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      signature_type: ${{ steps.version.outputs.signature_type }}
      create_release: ${{ steps.version.outputs.create_release }}
      trigger_type: ${{ steps.version.outputs.trigger_type }}
      trigger_actor: ${{ steps.version.outputs.trigger_actor }}
      trigger_type_display: ${{ steps.version.outputs.trigger_type_display }}
      build_time: ${{ steps.version.outputs.build_time }}
      run_id: ${{ steps.version.outputs.run_id }}
      build_duration: ${{ steps.duration.outputs.duration }}
      apk_size: ${{ steps.apk_info.outputs.apk_size }}
      apk_name: ${{ steps.apk_info.outputs.apk_name }}
      build_title: ${{ steps.build_title.outputs.title }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Record build start time
        id: start_time
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Set version variables
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TRIGGER_TYPE="workflow_dispatch"
            TRIGGER_TYPE_DISPLAY="手动触发"
            TRIGGER_ACTOR="${{ github.actor }}"
            VERSION_NAME="${{ github.event.inputs.version_name }}"
            SIGNATURE_TYPE="${{ github.event.inputs.signature_type }}"
            CREATE_RELEASE="${{ github.event.inputs.create_release }}"
          else
            TRIGGER_TYPE="push"
            TRIGGER_TYPE_DISPLAY="推送触发"
            TRIGGER_ACTOR="${{ github.actor }}"
            VERSION_NAME="dev-${GITHUB_SHA::7}"
            SIGNATURE_TYPE="debug"
            CREATE_RELEASE="false"
          fi

          VERSION_CODE="${{ github.run_number }}"
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          BRANCH_NAME="${GITHUB_REF_NAME}"
          RUN_ID="${{ github.run_id }}"

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "signature_type=$SIGNATURE_TYPE" >> $GITHUB_OUTPUT
          echo "create_release=$CREATE_RELEASE" >> $GITHUB_OUTPUT
          echo "trigger_type=$TRIGGER_TYPE" >> $GITHUB_OUTPUT
          echo "trigger_type_display=$TRIGGER_TYPE_DISPLAY" >> $GITHUB_OUTPUT
          echo "trigger_actor=$TRIGGER_ACTOR" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "SIGNATURE_TYPE=$SIGNATURE_TYPE" >> $GITHUB_ENV
          echo "CREATE_RELEASE=$CREATE_RELEASE" >> $GITHUB_ENV
          echo "TRIGGER_TYPE=$TRIGGER_TYPE" >> $GITHUB_ENV
          echo "TRIGGER_TYPE_DISPLAY=$TRIGGER_TYPE_DISPLAY" >> $GITHUB_ENV
          echo "TRIGGER_ACTOR=$TRIGGER_ACTOR" >> $GITHUB_ENV
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Set build title
        id: build_title
        run: |
          if [[ "${{ env.SIGNATURE_TYPE }}" == "release" ]]; then
            TITLE="正式编译 / Release Compile"
          else
            TITLE="测试编译 / Test Compile"
          fi

          if [[ "${{ env.CREATE_RELEASE }}" == "true" ]]; then
            TITLE="${TITLE} (发布到Releases / Releases Publish)"
          fi

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "BUILD_TITLE=$TITLE" >> $GITHUB_ENV

      - name: Setup keystore for signing
        run: |
          if [[ "${{ steps.version.outputs.signature_type }}" == "release" ]]; then
            if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
              echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
              echo "✅ Release keystore decoded"
              ls -la release.keystore
            else
              echo "⚠️ Warning: KEYSTORE_BASE64 not found, falling back to debug"
              echo "SIGNATURE_TYPE=debug" >> $GITHUB_ENV
            fi
          fi
          
          if [[ "${{ steps.version.outputs.signature_type }}" == "debug" ]] || [[ ! -f "release.keystore" ]]; then
            keytool -genkey -v \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Debug-CI, O=Android, C=CN" \
              -storepass android \
              -keypass android
            echo "✅ Debug keystore created"
          fi

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          SIGNATURE_TYPE: ${{ steps.version.outputs.signature_type }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Calculate build duration
        id: duration
        if: success()
        run: |
          duration=$(( $(date +%s) - ${{ steps.start_time.outputs.start }} ))
          minutes=$((duration / 60))
          seconds=$((duration % 60))
          echo "duration=${minutes}m ${seconds}s" >> $GITHUB_OUTPUT

      - name: Get APK info
        id: apk_info
        if: success()
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
            SIZE=$(du -h "$APK_PATH" | cut -f1)
            APK_NAME=$(basename "$APK_PATH")
            echo "apk_size=$SIZE" >> $GITHUB_OUTPUT
            echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          else
            echo "apk_size=unknown" >> $GITHUB_OUTPUT
            echo "apk_name=not_found" >> $GITHUB_OUTPUT
          fi

      - name: Build Success Output
        if: success()
        run: |
          echo ""
          echo "========================================"
          echo "🎉 ${{ env.BUILD_TITLE }}"
          echo "========================================"
          echo ""
          echo "📋 Build Info | 构建信息:"
          echo "  🏷️  Version | 版本: v${{ env.VERSION_NAME }}"
          echo "  🔢 Build Number | 构建编号: ${{ env.VERSION_CODE }}"
          echo "  ✍️  Signature | 签名类型: ${{ env.SIGNATURE_TYPE }}"
          echo "  🔘 Trigger | 触发方式: ${{ env.TRIGGER_TYPE }} (${{ env.TRIGGER_TYPE_DISPLAY }}) by @${{ env.TRIGGER_ACTOR }}"
          echo "  ⏱️  Duration | 构建耗时: ${{ steps.duration.outputs.duration }}"
          echo "  📦 APK Size | APK 大小: ${{ steps.apk_info.outputs.apk_size }}"
          echo ""
          echo "📥 Download | 下载:"
          echo "  https://github.com/${{ github.repository }}/actions/runs/${{ env.RUN_ID }}"
          echo "========================================"

      - name: Generate Build Summary
        if: success()
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## ${{ env.BUILD_TITLE }}

          ### 📋 Build Info | 构建信息

          | Item 项目 | Value 值 |
          |-----------|----------|
          | 🏷️ Version 版本 | v${{ env.VERSION_NAME }} |
          | 🔢 Build Number 构建编号 | ${{ env.VERSION_CODE }} |
          | ✍️ Signature 签名类型 | ${{ env.SIGNATURE_TYPE }} |
          | 🔘 Trigger 触发方式 | ${{ env.TRIGGER_TYPE }} (${{ env.TRIGGER_TYPE_DISPLAY }}) by @${{ env.TRIGGER_ACTOR }} |
          | 🌿 Branch 分支 | ${{ env.BRANCH_NAME }} |
          | ⏱️ Duration 构建耗时 | ${{ steps.duration.outputs.duration }} |
          | 📦 APK Size 大小 | ${{ steps.apk_info.outputs.apk_size }} |

          ### 📥 Download 下载

          - Artifact: DevInfo-${{ env.VERSION_NAME }}-${{ env.SIGNATURE_TYPE }}
          - [View Run Details 查看运行详情](https://github.com/${{ github.repository }}/actions/runs/${{ env.RUN_ID }})

          ---
          *Generated by GitHub Actions | 由 GitHub Actions 自动生成*
          EOF

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DevInfo-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.signature_type }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  generate-changelog:
    name: Generate Release Notes
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.create_release == 'true'
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" --reverse)
          else
            COMMITS=$(git log --pretty=format:"%s" --reverse)
          fi

          # Process commits
          UI=""
          LOGIC=""
          REPO=""
          FIX=""
          DOCS=""
          CI=""
          OTHER=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue

            if [[ "$line" =~ ^ui: ]]; then
              msg="${line#ui: }"
              UI="${UI}\n- ${msg}"
            elif [[ "$line" =~ ^logic: ]]; then
              msg="${line#logic: }"
              LOGIC="${LOGIC}\n- ${msg}"
            elif [[ "$line" =~ ^repo: ]]; then
              msg="${line#repo: }"
              REPO="${REPO}\n- ${msg}"
            elif [[ "$line" =~ ^fix: ]]; then
              msg="${line#fix: }"
              FIX="${FIX}\n- ${msg}"
            elif [[ "$line" =~ ^docs: ]]; then
              msg="${line#docs: }"
              DOCS="${DOCS}\n- ${msg}"
            elif [[ "$line" =~ ^ci: ]]; then
              msg="${line#ci: }"
              CI="${CI}\n- ${msg}"
            elif [[ "$line" =~ ^(feat|perf|refactor|chore|style|test): ]]; then
              msg="${line}"
              OTHER="${OTHER}\n- ${msg}"
            fi
          done <<< "$COMMITS"

          # Build updates section
          UPDATES=""
          [ -n "$UI" ] && UPDATES="${UPDATES}\n### 🎨 UI/界面\n${UI}\n"
          [ -n "$LOGIC" ] && UPDATES="${UPDATES}\n### ⚙️ Logic/Core 逻辑/核心\n${LOGIC}\n"
          [ -n "$REPO" ] && UPDATES="${UPDATES}\n### 📦 Repo/Build 仓库/构建\n${REPO}\n"
          [ -n "$FIX" ] && UPDATES="${UPDATES}\n### 🐛 Fix 修复\n${FIX}\n"
          [ -n "$DOCS" ] && UPDATES="${UPDATES}\n### 📝 Docs 文档\n${DOCS}\n"
          [ -n "$CI" ] && UPDATES="${UPDATES}\n### 🔧 CI/CD\n${CI}\n"
          [ -n "$OTHER" ] && UPDATES="${UPDATES}\n### 📌 Others 其他\n${OTHER}\n"

          if [ -z "$UPDATES" ]; then
            UPDATES="\n暂无详细更新记录，请查看提交历史\nNo detailed update log, please check the commit history\n"
          fi

          VERSION_NAME="${{ needs.build.outputs.version_name }}"
          SIGNATURE_TYPE="${{ needs.build.outputs.signature_type }}"
          TRIGGER_TYPE="${{ needs.build.outputs.trigger_type }}"
          TRIGGER_TYPE_DISPLAY="${{ needs.build.outputs.trigger_type_display }}"
          TRIGGER_ACTOR="${{ needs.build.outputs.trigger_actor }}"
          BUILD_TIME="${{ needs.build.outputs.build_time }}"
          RUN_ID="${{ needs.build.outputs.run_id }}"
          BUILD_DURATION="${{ needs.build.outputs.build_duration }}"
          APK_SIZE="${{ needs.build.outputs.apk_size }}"
          APK_NAME="${{ needs.build.outputs.apk_name }}"
          BUILD_TITLE="${{ needs.build.outputs.build_title }}"

          # Create release body with bilingual content
          cat > release_body.md <<RELEASE_EOF
          ## 🔖 $BUILD_TITLE

          > 🤖 由提交记录自动生成
          > 🌐 项目代码完全开源免费，并使用 MIT 协议

          ---

          ### 🚀 更新内容 | Update Contents
          ${UPDATES}

          ---

          ### 🤖 构建信息 | Build Information

          | 项目 Item | 值 Value |
          |-----------|----------|
          | ✅ **构建状态 Status** | Success |
          | ⏱️ **构建耗时 Duration** | ${BUILD_DURATION} |
          | 🔘 **触发方式 Trigger** | ${TRIGGER_TYPE} (${TRIGGER_TYPE_DISPLAY}) by @${TRIGGER_ACTOR} |
          | 📦 **产物 Artifact** | DevInfo-${VERSION_NAME}-${SIGNATURE_TYPE} (${APK_SIZE}) |
          | 🔗 **构建详情 Details** | [查看构建日志 View Build Log #${RUN_ID}](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}) |

          ---

          > 🤖 AI-generated: Please do not use if you mind.
          > 🌐 This project is fully open-source and free, licensed under MIT.

          ### 🚀 Update Contents
          ${UPDATES}

          ### 🤖 Build Information

          | Item | Value |
          |------|-------|
          | ✅ **Status** | Success |
          | ⏱️ **Duration** | ${BUILD_DURATION} |
          | 🔘 **Trigger** | ${TRIGGER_TYPE} (Manual) by @${TRIGGER_ACTOR} |
          | 📦 **Artifact** | DevInfo-${VERSION_NAME}-${SIGNATURE_TYPE} (${APK_SIZE}) |
          | 🔗 **Details** | [View Build Log #${RUN_ID}](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}) |

          ---

          *由 GitHub Actions 自动生成 | Generated by GitHub Actions*
          RELEASE_EOF
          
          # Set output
          {
            echo 'changelog<<EOF'
            cat release_body.md
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Display Release Notes
        run: |
          echo "========================================"
          echo "Release Notes Generated | 发布说明已生成"
          echo "========================================"
          cat release_body.md

  release:
    name: Create Release
    needs: [build, generate-changelog]
    runs-on: ubuntu-latest
    if: needs.build.outputs.create_release == 'true'

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: DevInfo-${{ needs.build.outputs.version_name }}-${{ needs.build.outputs.signature_type }}
          path: apk/

      - name: Rename APK
        run: |
          cd apk/
          for file in *.apk; do
            if [[ -f "$file" ]]; then
              new_name="DevInfo-v${{ needs.build.outputs.version_name }}-${{ needs.build.outputs.signature_type }}.apk"
              mv "$file" "$new_name"
              echo "Renamed: $file -> $new_name"
            fi
          done
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ needs.build.outputs.version_name }}"
          name: "🔖 v${{ needs.build.outputs.version_name }}"
          body: ${{ needs.generate-changelog.outputs.changelog }}
          files: apk/*.apk
          draft: false
          prerelease: ${{ needs.build.outputs.signature_type == 'debug' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Success Output
        if: success()
        run: |
          echo ""
          echo "========================================"
          echo "🎉 ${{ needs.build.outputs.build_title }}"
          echo "========================================"
          echo ""
          echo "📋 Release Info | 发布信息:"
          echo "  🏷️  Version | 版本: v${{ needs.build.outputs.version_name }}"
          echo "  🏷️  Tag | 标签: v${{ needs.build.outputs.version_name }}"
          echo "  ✍️  Signature | 签名类型: ${{ needs.build.outputs.signature_type }}"
          echo ""
          echo "🔗 Link | 链接:"
          echo "  https://github.com/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version_name }}"